# Rate limiting — max 20 requests/minute per IP on API endpoints
# Protects Groq and Jina AI free-tier quotas from abuse
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Spring Boot backend
    # burst=10 allows short bursts; nodelay serves them immediately without queuing
    location /api/ {
        limit_req           zone=api_limit burst=10 nodelay;
        limit_req_status    429;

        proxy_pass          http://backend:8080;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_read_timeout  300s;
    }

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
