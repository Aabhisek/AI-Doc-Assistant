# ── Application ──────────────────────────────────────────────────────────────
spring.application.name=ai-doc-assistant
server.port=${SERVER_PORT:8080}

# ── Database (PostgreSQL + pgvector) ─────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ragdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
# "create" drops and recreates all tables on startup — required after a schema change
# (e.g. switching from BIGINT to UUID primary key). Change back to "update" after
# the first successful startup to preserve data between restarts.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ── File upload limits ────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=${UPLOAD_DIR:./uploads}

# ── Groq Cloud Chat (free tier, ~10x faster than typical LLMs) ───────────────
# Get your free API key at https://console.groq.com  (no credit card needed)
spring.ai.openai.api-key=${GROQ_API_KEY:your-groq-api-key-here}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=${GROQ_CHAT_MODEL:llama-3.1-8b-instant}
spring.ai.openai.chat.options.temperature=0.3
# Cap output so Groq doesn't generate a response large enough to time out mid-stream
spring.ai.openai.chat.options.max-tokens=1024
# Groq has no embeddings endpoint — EmbeddingConfig.java creates a custom
# Nomic Atlas bean instead; disable auto-config to avoid a conflicting bean
spring.ai.openai.embedding.enabled=false

# ── Jina AI Embeddings (free tier — 1M tokens/month, fully OpenAI-compatible) ─
# Get your free API key at https://jina.ai  (no credit card needed)
jina.api-key=${JINA_API_KEY:your-jina-api-key-here}

# ── pgvector ──────────────────────────────────────────────────────────────────
# Disable auto-configuration — VectorStoreConfig.java creates the bean manually
# so we can control builder options explicitly.
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

# ── Long LLM calls timeout ────────────────────────────────────────────────────
spring.mvc.async.request-timeout=300000
server.tomcat.connection-timeout=300000

# ── Spring Boot Actuator (health endpoint for Docker + monitoring) ────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.example.aidocassistant=INFO
logging.level.org.springframework.ai=INFO
