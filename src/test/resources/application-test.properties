# Minimal properties for the test profile.
# @WebMvcTest only loads the web slice, so database and AI settings are irrelevant,
# but Spring will complain about missing placeholders unless defaults are provided here.

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.ai.openai.api-key=test-key
spring.ai.openai.base-url=https://api.groq.com/openai

jina.api-key=test-jina-key

app.upload.dir=./uploads-test

spring.autoconfigure.exclude=\
  org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
